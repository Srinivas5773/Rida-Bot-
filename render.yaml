services:
  - type: web
    name: whatsapp-ai-assistant
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: AUTH_PATH
        value: /home/render/.whatsapp_ai_auth
    healthCheckPath: /status
