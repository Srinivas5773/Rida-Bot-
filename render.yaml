services:
  - type: web
    name: whatsapp-ai-assistant
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /status
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_PATH
        value: /home/render/.whatsapp_ai_auth
      - key: GROQ_API_KEY
        sync: false
